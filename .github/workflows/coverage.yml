name: Test Coverage

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  test:
    name: Run Tests and Upload Coverage
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci || npm install

    - name: Patch SWC for Linux
      run: npm install -D @swc/core-linux-x64-gnu --no-save

    - name: Build Shared Library
      run: npm run build -w atlas-shared

    - name: Generate Prisma Client
      run: npm run db:generate -w atlas-server

    - name: Run Server Tests
      working-directory: ./atlas-server
      run: npm run test:cov
      
    - name: Run UI Tests
      working-directory: ./atlas-ui
      run: npm run test:cov
      
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
      
    - name: Run E2E Tests with Coverage
      run: npm run test:e2e:clean
      

        
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: pmalirz/atlas
        fail_ci_if_error: false
