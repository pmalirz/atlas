name: Test Coverage

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  test:
    name: Run Tests and Upload Coverage
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci || npm install

    - name: Patch SWC for Linux
      run: npm install -D @swc/core-linux-x64-gnu --no-save

    - name: Build Shared Library
      run: npm run build -w atlas-shared

    - name: Generate Prisma Client
      run: npm run db:generate -w atlas-server

    - name: Run Server Tests
      working-directory: ./atlas-server
      run: npm run test:cov
      
    - name: Run UI Tests
      working-directory: ./atlas-ui
      run: npm run test:cov
      
    - name: Run E2E Tests with Coverage
      run: npm run test:e2e:clean
      
    - name: Fix Docker File Permissions
      run: |
        sudo chown -R $USER:$USER ./atlas-e2e/coverage || true
        sudo chown -R $USER:$USER ./atlas-server/coverage-e2e || true

    - name: Generate Missing E2E Coverage Report
      run: |
        # Fix native V8 raw coverage dump 'file:///app/' URIs directly
        if [ -d ./atlas-server/coverage-e2e/tmp ]; then
          find ./atlas-server/coverage-e2e/tmp -name "*.json" -type f -exec sed -i "s|file:///app/|file://${{ github.workspace }}/|g" {} +
          # We MUST build the server locally so c8 can parse physical `dist/*.js.map` files!
          npm run build -w atlas-server
          cd ./atlas-server && npx -y c8 report --reporter=lcov --reporter=text --temp-directory=./coverage-e2e/tmp --reports-dir=./coverage-e2e || true
        fi

    - name: Fix E2E Coverage Paths
      run: |
        if [ -f ./atlas-e2e/coverage/lcov.info ]; then
          sed -i 's|SF:/app/|SF:|g' ./atlas-e2e/coverage/lcov.info
        fi
        if [ -f ./atlas-server/coverage-e2e/lcov.info ]; then
          sed -i 's|SF:/app/|SF:|g' ./atlas-server/coverage-e2e/lcov.info
        fi
        
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: pmalirz/atlas
        fail_ci_if_error: false
