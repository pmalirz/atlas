services:
  postgres-test:
    image: postgres:16-alpine
    container_name: atlas-test-db
    environment:
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas_dev_password
      POSTGRES_DB: app_atlas_test
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U atlas -d app_atlas_test" ]
      interval: 2s
      timeout: 5s
      retries: 5

  # Mailpit - local SMTP server for email testing
  mailpit:
    image: axllent/mailpit
    container_name: atlas-mailpit
    ports:
      - "8025:8025" # Web UI and API
      - "1025:1025" # SMTP
    environment:
      MP_MAX_MESSAGES: 5000
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8025/api/v1/messages" ]
      interval: 5s
      timeout: 5s
      retries: 3

  # Postgres and Mailpit infrastructure reserved for Native Node.js tests
